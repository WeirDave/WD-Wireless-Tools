name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build source zip
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          ZIPNAME="WD-Wireless-Tools-${TAG}.zip"

          zip -r "$ZIPNAME" \
            server.py \
            run.bat \
            run.command \
            requirements.txt \
            README.md \
            tools/ \
            web/ \
            templates/ \
            images/ \
            -x "**/__pycache__/*" "**/*.pyc" "**/*.pyo"

          echo "ZIPNAME=$ZIPNAME" >> "$GITHUB_ENV"
          echo "TAG=$TAG" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ env.TAG }}
          generate_release_notes: true
          files: ${{ env.ZIPNAME }}
